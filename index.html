<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kasir Pro - Mobile PWA</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 15px; background: #f8f9fa; }
        .section { display: none; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .active { display: block; }
        input, select { padding: 12px; width: 100%; margin: 8px 0; box-sizing: border-box; border: 1px solid #ddd; border-radius: 6px; }
        button { padding: 12px; background: #007bff; color: white; border: none; border-radius: 6px; cursor: pointer; width: 100%; margin-top: 5px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
    </style>
</head>
<body>

    <div id="login-screen" style="max-width: 300px; margin: 50px auto;">
        <h3>Login Kasir</h3>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Password">
        <button onclick="login()">Masuk</button>
    </div>

    <div id="app" style="display: none;">
        <div style="display: flex; gap: 5px; margin-bottom: 20px;">
            <button onclick="showSection('kasir')">🛒 Kasir</button>
            <button onclick="showSection('produk')">📦 Produk</button>
        </div>

        <div id="kasir" class="section active">
            <h2>Kasir</h2>
            <input type="text" id="barcode-input" placeholder="Scan Barcode & Tekan Enter..." onkeypress="checkBarcode(event)">
            <table id="cart-table"><tr><th>Nama</th><th>Harga</th></tr></table>
            <h3 id="total-price">Total: Rp 0</h3>
            <button class="btn-success" onclick="alert('Cetak Nota...')">Bayar</button>
        </div>

        <div id="produk" class="section">
            <h2>Manajemen Produk</h2>
            <input type="text" id="main-prod-name" placeholder="Nama Produk (ex: Sabun Mandi)">
            <button onclick="addMainProduct()">Simpan Produk Utama</button>
            <hr>
            <select id="select-main-prod"></select>
            <input type="text" id="var-name" placeholder="Nama Varian (ex: Putih)">
            <input type="text" id="var-barcode" placeholder="Barcode">
            <input type="number" id="var-price" placeholder="Harga">
            <button onclick="addVariant()">Tambah Varian</button>
            <table id="product-table"><tr><th>Produk</th><th>Varian</th><th>Harga</th></tr></table>
        </div>
    </div>

    <script>
        const firebaseConfig = {
  apiKey: "AIzaSyCJ1ASdvIHRTTS3ffBxdoqC-81Et-WYtI4",
  authDomain: "kasir-toko-saya.firebaseapp.com",
  projectId: "kasir-toko-saya",
  storageBucket: "kasir-toko-saya.firebasestorage.app",
  messagingSenderId: "999522535124",
  appId: "1:999522535124:web:76e8d7d13fc8fc0dcadd41"
};
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        function login() {
            auth.signInWithEmailAndPassword(document.getElementById('email').value, document.getElementById('password').value)
                .then(() => {
                    document.getElementById('login-screen').style.display = 'none';
                    document.getElementById('app').style.display = 'block';
                }).catch(e => alert(e.message));
        }

        function showSection(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        async function addMainProduct() {
            let name = document.getElementById('main-prod-name').value;
            await db.collection('main_products').add({ name });
            alert("Berhasil!");
        }

        async function addVariant() {
            let mainProdId = document.getElementById('select-main-prod').value;
            let variantName = document.getElementById('var-name').value;
            let barcode = document.getElementById('var-barcode').value;
            let price = parseInt(document.getElementById('var-price').value);
            await db.collection('variants').add({ mainProdId, variantName, barcode, price });
            alert("Varian ditambah!");
        }

        // Listener untuk dropdown produk utama
        db.collection('main_products').onSnapshot(snap => {
            let select = document.getElementById('select-main-prod');
            select.innerHTML = '<option value="">Pilih Produk...</option>';
            snap.forEach(doc => select.innerHTML += `<option value="${doc.id}">${doc.data().name}</option>`);
        });

        // Pencarian Barcode Kasir
        async function checkBarcode(e) {
            if (e.key === 'Enter') {
                let barcode = document.getElementById('barcode-input').value;
                let snap = await db.collection('variants').where("barcode", "==", barcode).get();
                if (!snap.empty) {
                    let v = snap.docs[0].data();
                    alert("Ditemukan: " + v.variantName + " - Rp " + v.price);
                    document.getElementById('barcode-input').value = '';
                } else {
                    alert("Barcode tidak ditemukan!");
                }
            }
        }
    </script>
</body>
</html>
